app:
  description: 从档案文本中抽取核心字段（题名/年度/责任者/密级…），产出编目 patch
  icon: card_index_dividers
  icon_background: '#E0E7FF'
  icon_type: emoji
  mode: chat
  name: AI 自动编目
  use_icon_as_answer_icon: true
dependencies:
- current_identifier: null
  type: marketplace
  value:
    marketplace_plugin_unique_identifier: langgenius/ollama:0.1.3@66e156c4f612964c131c49168882e78c2cdfe366879506b97ad855b23c5d6d98
    version: null
kind: app
model_config:
  agent_mode:
    enabled: false
    max_iteration: 10
    strategy: react
    tools: []
  annotation_reply:
    enabled: false
  chat_prompt_config:
    prompt:
    - role: system
      text: ''
  completion_prompt_config:
    conversation_histories_role:
      assistant_prefix: ''
      user_prefix: ''
    prompt:
      text: ''
  dataset_configs:
    datasets:
      datasets: []
    retrieval_model: multiple
    top_k: 4
  dataset_query_variable: ''
  external_data_tools: []
  file_upload:
    allowed_file_extensions: []
    allowed_file_types: []
    allowed_file_upload_methods: []
    enabled: false
    image:
      detail: high
      enabled: false
      number_limits: 3
      transfer_methods:
      - remote_url
      - local_file
    number_limits: 3
  model:
    completion_params:
      stop: []
      temperature: 0.2
    mode: chat
    name: qwen2.5:7b
    provider: langgenius/ollama/ollama
  more_like_this:
    enabled: false
  opening_statement: 把档案原文或扫描件 OCR 结果发给我，我抽取标准元数据字段（DH/QZH/TM/RZZ/ND/MJ/BGQX）生成编目
    Patch。
  pre_prompt: "你是 SAMS 档案自动编目助手。\n任务：从用户提供的档案文本中抽取以下核心字段：\n  TM 题名 / RZZ 责任者 / ND\
    \ 年度 / WJRQ 文件日期 / MJ 密级 / BGQX 保管期限 / 类目（文书/会计/人事…）\n硬字段（DH 档号）由后端 NoRule 引擎自动生成，无需推断。\n\
    输出 JSON：\n```\n{ \"TM\": \"...\", \"RZZ\": \"...\", \"ND\": 2024, ... , \"confidence\"\
    : 0.85 }\n```\n字段不确定时留空，并在最后段说明哪些字段需要人工核对。"
  prompt_type: simple
  retriever_resource:
    enabled: true
  sensitive_word_avoidance:
    config: {}
    enabled: false
    type: ''
  speech_to_text:
    enabled: false
  suggested_questions:
  - 从这段文字抽取编目字段：「关于成立 2024 年度信息化建设领导小组的通知 · 办公室 · 2024-03-15」
  suggested_questions_after_answer:
    enabled: false
  text_to_speech:
    enabled: false
    language: ''
    voice: ''
  user_input_form:
  - paragraph:
      label: 检索证据 (citations)
      variable: citations
      required: false
      default: ''
  - text-input:
      label: 场景代码 (scenario_code)
      variable: scenario_code
      required: false
      default: ''
  - text-input:
      label: 模型档位 (model_tier)
      variable: model_tier
      required: false
      default: ''
version: 0.6.0
