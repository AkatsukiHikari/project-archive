app:
  description: 对档案做真实性/完整性/可用性/安全性风险提示（建议态，不下判定）
  icon: shield
  icon_background: '#FEE2E2'
  icon_type: emoji
  mode: chat
  name: 四性检测建议
  use_icon_as_answer_icon: true
dependencies:
- current_identifier: null
  type: marketplace
  value:
    marketplace_plugin_unique_identifier: langgenius/ollama:0.1.3@66e156c4f612964c131c49168882e78c2cdfe366879506b97ad855b23c5d6d98
    version: null
kind: app
model_config:
  agent_mode:
    enabled: false
    max_iteration: 10
    strategy: react
    tools: []
  annotation_reply:
    enabled: false
  chat_prompt_config:
    prompt:
    - role: system
      text: ''
  completion_prompt_config:
    conversation_histories_role:
      assistant_prefix: ''
      user_prefix: ''
    prompt:
      text: ''
  dataset_configs:
    datasets:
      datasets: []
    retrieval_model: multiple
    top_k: 4
  dataset_query_variable: ''
  external_data_tools: []
  file_upload:
    allowed_file_extensions: []
    allowed_file_types: []
    allowed_file_upload_methods: []
    enabled: false
    image:
      detail: high
      enabled: false
      number_limits: 3
      transfer_methods:
      - remote_url
      - local_file
    number_limits: 3
  model:
    completion_params:
      stop: []
      temperature: 0.3
    mode: chat
    name: qwen2.5:7b
    provider: langgenius/ollama/ollama
  more_like_this:
    enabled: false
  opening_statement: 告诉我要检测的档案档号或上传材料元信息，我提示四性风险点供人工审核。
  pre_prompt: "你是 SAMS 四性检测辅助助手。\n任务：基于 {{citations}}（档案元数据 + 业务规则）从四个维度逐条给出风险提示：\n\
    \  ① 真实性（来源 / 责任者 / 时间链）\n  ② 完整性（哈希 / 子文件清单）\n  ③ 可用性（格式 / 编码 / 可读性）\n  ④ 安全性（密级标记\
    \ / 加密 / 备份）\n**只提示风险点，不下判定结论。** 用『可能 / 建议 / 需要核对』等措辞，不用『不通过 / 失败』。"
  prompt_type: simple
  retriever_resource:
    enabled: true
  sensitive_word_avoidance:
    config: {}
    enabled: false
    type: ''
  speech_to_text:
    enabled: false
  suggested_questions:
  - 档号 J001-WS-2024-Y-00014 的四性风险检测
  - 扫描件归档前的常见可用性风险有哪些？
  suggested_questions_after_answer:
    enabled: false
  text_to_speech:
    enabled: false
    language: ''
    voice: ''
  user_input_form:
  - paragraph:
      label: 检索证据 (citations)
      variable: citations
      required: false
      default: ''
  - text-input:
      label: 场景代码 (scenario_code)
      variable: scenario_code
      required: false
      default: ''
  - text-input:
      label: 模型档位 (model_tier)
      variable: model_tier
      required: false
      default: ''
version: 0.6.0
