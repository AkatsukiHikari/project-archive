app:
  description: 查询索引状态、触发重建、回答知识库相关问题
  icon: card_file_box
  icon_background: '#FEF3C7'
  icon_type: emoji
  mode: chat
  name: 知识库管理
  use_icon_as_answer_icon: true
dependencies:
- current_identifier: null
  type: marketplace
  value:
    marketplace_plugin_unique_identifier: langgenius/ollama:0.1.3@66e156c4f612964c131c49168882e78c2cdfe366879506b97ad855b23c5d6d98
    version: null
kind: app
model_config:
  agent_mode:
    enabled: false
    max_iteration: 10
    strategy: react
    tools: []
  annotation_reply:
    enabled: false
  chat_prompt_config:
    prompt:
    - role: system
      text: ''
  completion_prompt_config:
    conversation_histories_role:
      assistant_prefix: ''
      user_prefix: ''
    prompt:
      text: ''
  dataset_configs:
    datasets:
      datasets: []
    retrieval_model: multiple
    top_k: 4
  dataset_query_variable: ''
  external_data_tools: []
  file_upload:
    allowed_file_extensions: []
    allowed_file_types: []
    allowed_file_upload_methods: []
    enabled: false
    image:
      detail: high
      enabled: false
      number_limits: 3
      transfer_methods:
      - remote_url
      - local_file
    number_limits: 3
  model:
    completion_params:
      stop: []
      temperature: 0.2
    mode: chat
    name: qwen2.5:7b
    provider: langgenius/ollama/ollama
  more_like_this:
    enabled: false
  opening_statement: 问我知识库的状态、覆盖范围，或触发重建。
  pre_prompt: "你是 SAMS 知识库管理助手。\n任务：回答用户关于 SAMS 知识库的问题：\n  ① L1 元数据：全部档案的核心字段，来自 PostgreSQL，自动增量同步到\
    \ ES；\n  ② L4 业务规则：DA/T 标准 + 内部规章，30 条种子数据；\n  ③ L2 OCR 原文：P3 阶段接入。\n用户可以通过『重建知识库』触发全量重建。重建操作通过\
    \ staging patch 走审核队列。"
  prompt_type: simple
  retriever_resource:
    enabled: true
  sensitive_word_avoidance:
    config: {}
    enabled: false
    type: ''
  speech_to_text:
    enabled: false
  suggested_questions:
  - 知识库现在有多少档案？
  - 如何重建 L1 元数据索引？
  - L4 业务规则有哪些类别？
  suggested_questions_after_answer:
    enabled: false
  text_to_speech:
    enabled: false
    language: ''
    voice: ''
  user_input_form:
  - paragraph:
      label: 检索证据 (citations)
      variable: citations
      required: false
      default: ''
  - text-input:
      label: 场景代码 (scenario_code)
      variable: scenario_code
      required: false
      default: ''
  - text-input:
      label: 模型档位 (model_tier)
      variable: model_tier
      required: false
      default: ''
version: 0.6.0
