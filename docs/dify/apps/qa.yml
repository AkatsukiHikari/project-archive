app:
  description: 基于档案知识库的检索增强问答，强制引用，无证据拒答
  icon: speech_balloon
  icon_background: '#E0F2FE'
  icon_type: emoji
  mode: chat
  name: 档案智能问答
  use_icon_as_answer_icon: true
dependencies:
- current_identifier: null
  type: marketplace
  value:
    marketplace_plugin_unique_identifier: langgenius/ollama:0.1.3@66e156c4f612964c131c49168882e78c2cdfe366879506b97ad855b23c5d6d98
    version: null
kind: app
model_config:
  agent_mode:
    enabled: false
    max_iteration: 10
    strategy: react
    tools: []
  annotation_reply:
    enabled: false
  chat_prompt_config:
    prompt:
    - role: system
      text: ''
  completion_prompt_config:
    conversation_histories_role:
      assistant_prefix: ''
      user_prefix: ''
    prompt:
      text: ''
  dataset_configs:
    datasets:
      datasets: []
    retrieval_model: multiple
    top_k: 4
  dataset_query_variable: ''
  external_data_tools: []
  file_upload:
    allowed_file_extensions: []
    allowed_file_types: []
    allowed_file_upload_methods: []
    enabled: false
    image:
      detail: high
      enabled: false
      number_limits: 3
      transfer_methods:
      - remote_url
      - local_file
    number_limits: 3
  model:
    completion_params:
      stop: []
      temperature: 0.3
    mode: chat
    name: qwen2.5:7b
    provider: langgenius/ollama/ollama
  more_like_this:
    enabled: false
  opening_statement: 你好！我是 SAMS 档案智能问答助手。我会基于档案库内容回答你的问题，并标注每条答案的出处。
  pre_prompt: '你是 SAMS 档案智能问答助手。

    回答原则：

    1. 仅基于用户消息附带的 {{citations}}（业务规则 + 档案元数据）作答；

    2. 引用必须明确指出来源标题；

    3. 无证据时回复：『未在知识库中找到相关档案或规则，请补充关键词或时间/全宗号条件。』；

    4. 涉及绝密档案时拒答；

    5. 用专业、简洁、有条理的中文输出。'
  prompt_type: simple
  retriever_resource:
    enabled: true
  sensitive_word_avoidance:
    config: {}
    enabled: false
    type: ''
  speech_to_text:
    enabled: false
  suggested_questions:
  - 永久保管期限的档案有哪些类型？
  - 档号 DH 字段是如何组成的？
  - 四性检测包含哪些内容？
  suggested_questions_after_answer:
    enabled: false
  text_to_speech:
    enabled: false
    language: ''
    voice: ''
  user_input_form:
  - paragraph:
      label: 检索证据 (citations)
      variable: citations
      required: false
      default: ''
  - text-input:
      label: 场景代码 (scenario_code)
      variable: scenario_code
      required: false
      default: ''
  - text-input:
      label: 模型档位 (model_tier)
      variable: model_tier
      required: false
      default: ''
version: 0.6.0
