        topics: []
        vision:
          enabled: false
      position:
        x: 360
        y: 280
      sourcePosition: right
      targetPosition: left
    - id: http_qa
      type: custom
      data:
        type: http-request
        title: 调用后端 · 问答
        desc: 回调 /tool/dispatch_text（tool_name=qa）取权威数据
        method: post
        url: http://host.docker.internal:8000/api/v1/ai/internal/tool/dispatch_text
        authorization:
          type: no-auth
          config: null
        headers: 'Content-Type:application/json

          X-User-Token:{{#node_start.user_token#}}'
        params: ''
        body:
          type: json
          data:
          - key: ''
            type: text
            value: '{"tool_name": "qa", "fallback_tool_name": "qa", "arguments": {"query":
              "{{#sys.query#}}", "tenant_id": "{{#node_start.tenant_id#}}"}}'
        timeout:
          connect: 10
          read: 60
          write: 30
        retry_config:
          enabled: false
          max_retries: 1
          retry_interval: 1000
          exponential_backoff:
            enabled: false
            multiplier: 2
            max_interval: 10000
      position:
        x: 660
        y: 80
      sourcePosition: right
      targetPosition: left
    - id: llm_qa
      type: custom
      data:
        type: llm
        title: 问答 · 整理
        desc: 该意图自己的 LLM：把后端权威数据按意图排版并流式输出
        model:
          provider: langgenius/ollama/ollama
          name: qwen2.5:7b
          mode: chat
          completion_params:
            temperature: 0.2
        prompt_template:
        - role: system
          text: "你是 SAMS 档案库问答助手。\n\n用户问题：{{#sys.query#}}\n\n后端检索到的真实素材（权威数据，可能是档案条目清单，也可能是业务规则文本）：\n\
            {{#http_qa.body#}}\n\n【输出要求】\n1. 只能基于素材作答，绝不编造素材之外的档案、年度、档号、责任者或结论。\n\
            2. 若素材是档案条目清单（每行形如 `archive_id | 档号 | 题名 | 年度 | 责任者 | 全宗号`），逐条输出为带编号的可点击列表，不得遗漏：\n\
            \   1. [题名](/archive/reader?id=该行的archive_id) — 档号 `档号` · 年度 年 · 责任者 责任者\n\
            \   archive_id 只用于拼链接，不要显示给用户。\n3. 若素材是业务规则/说明文本，用简洁自然的中文作答，Markdown 排版，关键结论\
            \ **加粗**。\n4. 仅当素材明确为『未命中/为空』时，才回复：未检索到相关内容，请补充关键词、年份或全宗号后重试。素材包含任何条目时绝不能说未找到。\n\
            5. 不要以『根据…』『以下是…』开头，不要出现『前端/后端/系统/JSON/字段/素材』等技术词。"
        memory:
          query_prompt_template: '{{#sys.query#}}'
          window:
            enabled: false
            size: 10
        context:
          enabled: false
          variable_selector: []
        vision:
          enabled: false
        variables: []
      position:
        x: 960
        y: 80
      sourcePosition: right
      targetPosition: left
