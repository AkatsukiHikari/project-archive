        desc: 把用户问题归到对应档案业务场景，路由到该意图分支
        query_variable_selector:
        - sys
        - query
        model:
          provider: langgenius/ollama/ollama
          name: qwen2.5:7b
          mode: chat
          completion_params:
            temperature: 0.1
        classes:
        - id: qa
          name: 问答（基于档案知识库的检索增强问答）
        - id: search
          name: 检索（自然语言查询转结构化检索，定位档案）
        - id: summary
          name: 综述（按主题/全宗/类目生成专题综述）
        - id: attach
          name: 挂接（新材料匹配档案，产出挂接 patch）
        - id: catalog
          name: 编目（从档案文本抽取元数据生成编目 patch）
        - id: fournat
          name: 四性（真实性/完整性/可用性/安全性 风险提示）
        - id: draft
          name: 拟稿（鉴定意见 / 销毁建议 / 利用报告草稿）
        - id: relate
          name: 关联（找语义/时间/责任者相关的其他档案）
        - id: kb_manage
          name: 知识库（查询索引状态、触发重建）
        instruction: "根据用户的提问内容，从以下档案业务场景中选择最匹配的一个：\n  问答: 基于档案知识库的检索增强问答\n  检索: 自然语言查询转结构化检索，定位档案\n\
          \  综述: 按主题/全宗/类目生成专题综述\n  挂接: 新材料匹配档案，产出挂接 patch\n  编目: 从档案文本抽取元数据生成编目 patch\n\
          \  四性: 真实性/完整性/可用性/安全性 风险提示\n  拟稿: 鉴定意见 / 销毁建议 / 利用报告草稿\n  关联: 找语义/时间/责任者相关的其他档案\n\
          \  知识库: 查询索引状态、触发重建\n\n参考示例：\n- 「永久保管期限是多久」 → 问答\n- 「档号是如何组成的」 → 问答\n- 「四性检测包含哪些」\
          \ → 问答\n- 「查 2024 年的财务凭证」 → 检索\n- 「找市档案馆人事任免文件」 → 检索\n- 「数字化建设相关档案」 → 检索\n\
          - 「2024 年度财务工作综述」 → 综述\n- 「近三年数字化建设进展」 → 综述\n- 「永久保管档案管理要点」 → 综述\n- 「把这份新材料挂接到合适的目录」\
          \ → 挂接\n- 「为这份文件找归属档案」 → 挂接\n- 「新材料归类到哪个目录」 → 挂接\n- 「从这段文字抽取档案字段」 → 编目\n\
          - 「自动编目这份文件」 → 编目\n- 「提取题名责任者年度」 → 编目\n- 「做四性检测」 → 四性\n- 「档案的真实性如何评估」 →\
          \ 四性\n- 「归档前的可用性风险」 → 四性\n- 「拟一份销毁建议」 → 拟稿\n- 「写一份利用工作报告」 → 拟稿\n- 「起草档案鉴定意见」\
          \ → 拟稿\n- 「找跟这份档案相关的其他档案」 → 关联\n- 「档案的关联分析」 → 关联\n- 「类似主题的档案有哪些」 → 关联\n\
          - 「知识库现在有多少档案」 → 知识库\n- 「如何重建索引」 → 知识库\n- 「L4 业务规则有哪些类别」 → 知识库\n\n判断要点：含『查/找』→检索；『综述/汇总』→综述；『新材料/挂接』→挂接；『字段/抽取』→编目；『真实性/完整性』→四性；『拟/起草/写一份』→拟稿；『相关/关联』→关联；『索引/重建/知识库』→知识库；其余一般问答→问答。"
        instructions: "根据用户的提问内容，从以下档案业务场景中选择最匹配的一个：\n  问答: 基于档案知识库的检索增强问答\n  检索:\
          \ 自然语言查询转结构化检索，定位档案\n  综述: 按主题/全宗/类目生成专题综述\n  挂接: 新材料匹配档案，产出挂接 patch\n \
